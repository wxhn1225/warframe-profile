<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warframe Profile — 战甲档案查看器</title>
  <meta name="description" content="轻量级桌面工具，快速查看 Warframe 国际服玩家档案。支持 PC、PS、Xbox、Switch、Mobile 平台。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #ddd0be;
      --bg2:      #e8ddd0;
      --bg3:      #d0c4b0;
      --border:   #bfb09a;
      --brown:    #4a3020;
      --brown-md: #7a5a40;
      --brown-lt: #9a7858;
      --accent:   #6a4020;
      --accent-lt:#8a5830;
      --text:     #261a0e;
      --muted:    #7a6450;
      --radius:   12px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container { max-width: 860px; margin: 0 auto; padding: 0 24px; }

    /* ── nav ── */
    nav {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 14px 0;
      position: sticky; top: 0; z-index: 50;
    }
    nav .inner {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 860px; margin: 0 auto; padding: 0 24px;
    }
    .logo {
      display: flex; align-items: center; gap: 9px;
      font-weight: 600; font-size: 15px; color: var(--brown);
    }
    .logo svg { width: 20px; height: 20px; flex-shrink: 0; color: var(--accent); }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { font-size: 13px; color: var(--muted); transition: color .2s; }
    .nav-links a:hover { color: var(--brown); text-decoration: none; }

    /* ── hero ── */
    .hero {
      padding: 72px 0 56px;
      text-align: center;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 55% at 50% 0%, rgba(160,100,50,.08), transparent);
      pointer-events: none;
    }
    .badge {
      display: inline-block;
      padding: 4px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--muted);
      background: var(--bg2);
      margin-bottom: 22px;
      letter-spacing: .03em;
    }
    h1 {
      font-size: clamp(30px, 6vw, 50px);
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1.15;
      margin-bottom: 16px;
      color: var(--brown);
    }
    h1 span { color: var(--accent); }
    .subtitle {
      font-size: 15px;
      color: var(--muted);
      max-width: 500px;
      margin: 0 auto 36px;
      line-height: 1.7;
    }

    /* ── download ── */
    .dl-area { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .dl-primary {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      padding: 13px 28px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .2s, transform .15s;
      border: none;
      text-decoration: none;
    }
    .dl-primary:hover { background: var(--accent-lt); transform: translateY(-1px); text-decoration: none; }
    .dl-primary:active { transform: translateY(0); }
    .dl-primary svg { width: 17px; height: 17px; flex-shrink: 0; }
    .dl-meta { font-size: 12px; color: var(--muted); }
    .dl-meta .ver { font-family: 'JetBrains Mono', monospace; color: var(--accent); }

    /* ── pills ── */
    .platform-pills {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
      margin-top: 28px;
    }
    .pill {
      padding: 4px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--muted);
      background: var(--bg2);
    }

    /* ── section ── */
    section { padding: 60px 0; }
    section + section { border-top: 1px solid var(--border); }
    .section-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--accent-lt); margin-bottom: 10px;
    }
    h2 { font-size: 24px; font-weight: 700; letter-spacing: -.01em; margin-bottom: 28px; color: var(--brown); }

    /* ── features ── */
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .feature {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .feature-icon {
      width: 34px; height: 34px;
      background: rgba(120,70,30,.08);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
    }
    .feature-icon svg { width: 17px; height: 17px; color: var(--accent); }
    .feature h3 { font-size: 14px; font-weight: 600; margin-bottom: 5px; color: var(--brown); }
    .feature p  { font-size: 13px; color: var(--muted); line-height: 1.55; }

    /* ── release cards ── */
    .release-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 12px;
    }
    .release-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      transition: background .15s;
    }
    .release-head:hover { background: var(--bg3); }
    .release-tag { display: flex; align-items: center; gap: 10px; }
    .tag-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; font-weight: 500;
      color: var(--accent);
    }
    .tag-latest {
      font-size: 10px; padding: 2px 8px;
      background: rgba(120,70,30,.08);
      border: 1px solid var(--border);
      border-radius: 10px; color: var(--accent-lt);
    }
    .release-date { font-size: 12px; color: var(--muted); }
    .release-body {
      padding: 14px 18px;
      font-size: 13px; color: var(--text);
      line-height: 1.7;
    }
    .release-body ul { padding-left: 18px; }
    .release-body li { margin-bottom: 4px; }
    .release-body p  { margin-bottom: 6px; }
    .release-body.collapsed { display: none; }

    .dl-row {
      display: flex; gap: 8px; flex-wrap: wrap;
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      background: var(--bg3);
    }
    .dl-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--brown-md);
      background: var(--bg2);
      cursor: pointer;
      text-decoration: none;
      transition: border-color .2s, color .2s;
    }
    .dl-btn:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }
    .dl-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* ── notice ── */
    .notice {
      background: rgba(120,70,30,.05);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 16px;
      font-size: 13px;
      color: var(--muted);
      display: flex; gap: 10px; align-items: flex-start;
      margin-bottom: 24px;
    }
    .notice svg { width: 15px; height: 15px; color: var(--accent-lt); flex-shrink: 0; margin-top: 2px; }

    /* ── skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--bg3) 25%, var(--border) 50%, var(--bg3) 75%);
      background-size: 400% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 0;
      font-size: 12px;
      color: var(--muted);
    }
    footer .inner {
      max-width: 860px; margin: 0 auto; padding: 0 24px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 10px;
    }

    @media (max-width: 600px) {
      .nav-links { display: none; }
      .dl-primary { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<nav>
  <div class="inner">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M12 12v9M8 17l4 4 4-4M4 12a8 8 0 0 1 16 0"/>
      </svg>
      Warframe Profile
    </div>
    <div class="nav-links">
      <a href="#download">下载</a>
      <a href="#changelog">更新日志</a>
      <a href="https://github.com/wxhn1225/warframe-profile" target="_blank" rel="noopener">GitHub</a>
    </div>
  </div>
</nav>

<div class="container">

  <!-- Hero -->
  <div class="hero">
    <div class="badge">国际服 · 仅 Windows · 免费开源</div>
    <h1>快速查看你的<br><span>战甲档案</span></h1>
    <p class="subtitle">轻量桌面工具，无需登录，一键读取 EE.log 并展示精通、装备、统计、氏族等完整档案数据。</p>
    <div class="dl-area" id="hero-dl">
      <div class="skeleton" style="width:196px;height:50px;border-radius:12px;"></div>
      <div class="skeleton" style="width:160px;height:14px;margin-top:4px;"></div>
    </div>
    <div class="platform-pills">
      <span class="pill">PC</span>
      <span class="pill">PlayStation</span>
      <span class="pill">Xbox</span>
      <span class="pill">Switch</span>
      <span class="pill">Mobile</span>
    </div>
  </div>

  <!-- Download -->
  <section id="download">
    <div class="section-label">下载</div>
    <h2>获取最新版本</h2>
    <div class="notice">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      本工具仅支持 <strong style="color:var(--brown)">国际服</strong> 账号。国服玩家可在应用查询页底部找到对应入口。
    </div>
    <div id="dl-section">
      <div class="skeleton" style="height:110px;border-radius:12px;"></div>
    </div>
  </section>

  <!-- Changelog -->
  <section id="changelog">
    <div class="section-label">更新日志</div>
    <h2>版本历史</h2>
    <div id="changelog-list">
      <div class="skeleton" style="height:52px;border-radius:12px;margin-bottom:10px;"></div>
      <div class="skeleton" style="height:52px;border-radius:12px;margin-bottom:10px;"></div>
      <div class="skeleton" style="height:52px;border-radius:12px;"></div>
    </div>
  </section>

</div>

<footer>
  <div class="inner">
    <span>© 2025–2026 Warframe Profile — MIT License</span>
    <span>本项目与 Digital Extremes 无关联</span>
  </div>
</footer>

<script>
const REPO       = 'wxhn1225/warframe-profile';
const LOCAL_JSON = './releases.json';
const API_URL    = `https://api.github.com/repos/${REPO}/releases?per_page=10`;

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' });
}

function mdToHtml(md) {
  if (!md) return '<p style="color:var(--muted)">暂无说明</p>';
  const lines = md.split('\n');
  let html = '', inList = false;
  for (let line of lines) {
    line = line.trim();
    if (!line) { if (inList) { html += '</ul>'; inList = false; } continue; }
    if (line.startsWith('### ') || line.startsWith('## ')) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<p style="font-weight:600;margin-top:10px;">${esc(line.replace(/^#{2,3}\s*/, ''))}</p>`;
    } else if (line.startsWith('- ') || line.startsWith('* ')) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${esc(line.slice(2))}</li>`;
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<p>${esc(line)}</p>`;
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function dlBtns(assets) {
  const exeZh   = assets.find(a => a.name.endsWith('.exe') && a.name.includes('-zh'));
  const exeFull = assets.find(a => a.name.endsWith('.exe') && a.name.includes('-full'));
  const fallback = `https://github.com/${REPO}/releases/latest`;
  let html = `<a class="dl-btn" href="${exeZh?.browser_download_url || fallback}" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    简中版 .exe</a>`;
  if (exeFull) {
    html += `<a class="dl-btn" href="${exeFull.browser_download_url}" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      多语言版 .exe</a>`;
  }
  html += `<a class="dl-btn" href="https://github.com/${REPO}/releases" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    所有发行版</a>`;
  return html;
}

const loadReleases = () =>
  fetch(LOCAL_JSON)
    .then(r => { if (!r.ok) throw new Error('local not found'); return r.json(); })
    .catch(() => fetch(API_URL).then(r => r.json()));

loadReleases()
  .then(releases => {
    if (!Array.isArray(releases) || !releases.length) throw new Error('empty');
    const latest = releases[0];
    const exe = latest.assets?.find(a => a.name.endsWith('.exe') && a.name.includes('-zh'));

    // hero
    document.getElementById('hero-dl').innerHTML = `
      <a class="dl-primary" href="${exe?.browser_download_url || `https://github.com/${REPO}/releases/latest`}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        下载最新版
      </a>
      <span class="dl-meta">
        <span class="ver">${latest.tag_name}</span> · Windows x64 · 简中版 · ${fmtDate(latest.published_at)}
      </span>`;

    // download section
    document.getElementById('dl-section').innerHTML = `
      <div class="release-card">
        <div class="release-head" style="cursor:default;">
          <div class="release-tag">
            <span class="tag-name">${latest.tag_name}</span>
            <span class="tag-latest">latest</span>
          </div>
          <span class="release-date">${fmtDate(latest.published_at)}</span>
        </div>
        <div class="release-body">${mdToHtml(latest.body)}</div>
        <div class="dl-row">${dlBtns(latest.assets || [])}</div>
      </div>`;

    // changelog
    document.getElementById('changelog-list').innerHTML = releases.map((rel, i) => {
      const id = `rel-${i}`;
      return `
        <div class="release-card">
          <div class="release-head" onclick="toggle('${id}')">
            <div class="release-tag">
              <span class="tag-name">${rel.tag_name}</span>
              ${i === 0 ? '<span class="tag-latest">latest</span>' : ''}
            </div>
            <span class="release-date">${fmtDate(rel.published_at)}</span>
          </div>
          <div class="release-body ${i === 0 ? '' : 'collapsed'}" id="${id}">${mdToHtml(rel.body)}</div>
          <div class="dl-row">${dlBtns(rel.assets || [])}</div>
        </div>`;
    }).join('');
  })
  .catch(() => {
    const fb = `<p style="font-size:14px;color:var(--muted)">无法加载版本信息，请前往
      <a href="https://github.com/${REPO}/releases" target="_blank">GitHub Releases</a> 手动下载。</p>`;
    ['hero-dl','dl-section','changelog-list'].forEach(id => {
      document.getElementById(id).innerHTML = fb;
    });
  });

function toggle(id) {
  document.getElementById(id).classList.toggle('collapsed');
}
</script>
</body>
</html>
