<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warframe Profile — 战甲档案查看器</title>
  <meta name="description" content="轻量级桌面工具，快速查看 Warframe 国际服玩家档案。支持 PC、PS、Xbox、Switch、Mobile 平台。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #09090b;
      --bg2:    #18181b;
      --bg3:    #27272a;
      --border: #3f3f46;
      --text:   #fafafa;
      --muted:  #a1a1aa;
      --subtle: #71717a;
      --white:  #ffffff;
      --radius: 10px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.6; min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--text); text-decoration: none; }
    .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }

    /* nav */
    nav {
      position: sticky; top: 0; z-index: 50;
      border-bottom: 1px solid var(--border);
      background: rgba(9,9,11,.88);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    nav .inner {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 720px; margin: 0 auto; padding: 0 24px; height: 54px;
    }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; }
    .logo-icon {
      width: 26px; height: 26px; border: 1px solid var(--border);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      background: var(--bg2);
    }
    .logo-icon svg { width: 13px; height: 13px; color: var(--muted); }
    .nav-links { display: flex; align-items: center; gap: 2px; }
    .nav-links a {
      font-size: 13px; color: var(--muted); padding: 5px 10px; border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .nav-links a:hover { color: var(--text); background: var(--bg2); }

    /* hero */
    .hero { padding: 88px 0 72px; text-align: center; position: relative; overflow: hidden; }
    .hero::before {
      content: ''; position: absolute; width: 560px; height: 280px;
      top: -50px; left: 50%; transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(255,255,255,.05) 0%, transparent 70%);
      pointer-events: none;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border: 1px solid var(--border); border-radius: 20px;
      font-size: 12px; color: var(--muted); background: var(--bg2); margin-bottom: 22px;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    h1 {
      font-size: clamp(30px, 6vw, 50px); font-weight: 700;
      letter-spacing: -.03em; line-height: 1.1; color: var(--white); margin-bottom: 18px;
    }
    .subtitle { font-size: 15px; color: var(--muted); max-width: 420px; margin: 0 auto 36px; line-height: 1.65; }

    /* download block in hero */
    .hero-dl-block {
      display: inline-flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 24px; background: var(--white); color: var(--bg);
      font-weight: 600; font-size: 14px; border-radius: var(--radius);
      border: none; cursor: pointer; transition: opacity .15s, transform .15s; text-decoration: none;
    }
    .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
    .btn-primary svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* code box */
    .code-box {
      display: inline-flex; align-items: center; gap: 0;
      border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
      background: var(--bg2);
    }
    .code-label { padding: 8px 12px; font-size: 13px; color: var(--muted); border-right: 1px solid var(--border); }
    .code-val {
      padding: 8px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px; font-weight: 600; color: var(--white);
      letter-spacing: .05em;
    }
    .code-copy {
      padding: 8px 12px; border-left: 1px solid var(--border);
      cursor: pointer; color: var(--subtle); font-size: 12px;
      transition: color .15s, background .15s; background: transparent; border: none;
      border-left: 1px solid var(--border);
    }
    .code-copy:hover { color: var(--text); background: var(--bg3); }

    .dl-meta { font-size: 12px; color: var(--subtle); }
    .dl-meta .ver { font-family: 'JetBrains Mono', monospace; color: var(--muted); }

    /* platforms */
    .platforms { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; margin-top: 28px; }
    .plat { padding: 3px 11px; border: 1px solid var(--border); border-radius: 20px; font-size: 11px; color: var(--subtle); }

    hr { border: none; border-top: 1px solid var(--border); }
    section { padding: 52px 0; }
    .sec-label { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--subtle); margin-bottom: 10px; }
    h2 { font-size: 21px; font-weight: 700; letter-spacing: -.02em; color: var(--white); margin-bottom: 22px; }

    .notice {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg2); font-size: 13px; color: var(--muted); margin-bottom: 18px;
    }
    .notice svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 2px; color: var(--subtle); }

    /* download cards */
    .dl-card {
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg2); overflow: hidden; margin-bottom: 10px;
    }
    .dl-card-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
    }
    .dl-card-lhs { display: flex; align-items: center; gap: 10px; }
    .tag-name { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; }
    .tag-latest { font-size: 10px; padding: 2px 7px; border: 1px solid var(--border); border-radius: 10px; color: var(--subtle); background: var(--bg3); }
    .dl-card-date { font-size: 12px; color: var(--subtle); }

    .dl-card-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .dl-item {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }
    .dl-item-name { font-size: 13px; color: var(--muted); }
    .dl-item-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .dl-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border: 1px solid var(--border); border-radius: 7px;
      font-size: 13px; color: var(--text); background: var(--bg3);
      cursor: pointer; text-decoration: none; transition: border-color .15s;
    }
    .dl-link:hover { border-color: var(--subtle); }
    .dl-link svg { width: 13px; height: 13px; flex-shrink: 0; }
    .dl-code-inline {
      display: inline-flex; align-items: center; gap: 0;
      border: 1px solid var(--border); border-radius: 7px; overflow: hidden;
      background: var(--bg2); font-size: 12px;
    }
    .dl-code-inline span:first-child { padding: 7px 10px; color: var(--subtle); border-right: 1px solid var(--border); }
    .dl-code-inline .code-v { padding: 7px 10px; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; color: var(--white); }
    .dl-code-inline button {
      padding: 7px 10px; background: transparent; border: none; border-left: 1px solid var(--border);
      color: var(--subtle); cursor: pointer; font-size: 11px; transition: color .15s, background .15s;
    }
    .dl-code-inline button:hover { color: var(--text); background: var(--bg3); }

    /* skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
      background-size: 400% 100%; animation: shimmer 1.6s infinite; border-radius: 8px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    footer { border-top: 1px solid var(--border); padding: 22px 0; }
    footer .inner {
      max-width: 720px; margin: 0 auto; padding: 0 24px;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
      font-size: 12px; color: var(--subtle);
    }

    @media (max-width: 540px) {
      .nav-links { display: none; }
      .hero-dl-block { width: 100%; }
      .btn-primary { width: 100%; justify-content: center; }
      .dl-item { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<nav>
  <div class="inner">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="3.5"/><path d="M12 11.5v8M9 17l3 3 3-3"/>
        </svg>
      </div>
      Warframe Profile
    </div>
    <div class="nav-links">
      <a href="#download">下载</a>
    </div>
  </div>
</nav>

<div class="container">

  <div class="hero">
    <div class="badge"><span class="badge-dot"></span>国际服 · 免费工具</div>
    <h1>Warframe<br>Profile Viewer</h1>
    <p class="subtitle">无需登录，一键读取 EE.log，快速查看国际服玩家完整档案数据。</p>

    <div id="hero-area">
      <div class="skeleton" style="width:200px;height:44px;border-radius:10px;margin:0 auto 12px;"></div>
      <div class="skeleton" style="width:220px;height:38px;border-radius:8px;margin:0 auto;"></div>
    </div>

    <div class="dl-meta" id="hero-meta" style="margin-top:14px;">&nbsp;</div>
    <div class="platforms">
      <span class="plat">PC</span>
      <span class="plat">PlayStation</span>
      <span class="plat">Xbox</span>
      <span class="plat">Switch</span>
      <span class="plat">Mobile</span>
    </div>
  </div>

  <hr />

  <section id="download">
    <div class="sec-label">下载</div>
    <h2>最新版本</h2>
    <div class="notice">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      本工具仅支持<strong style="color:var(--text);margin:0 3px">国际服</strong>账号。国服玩家可在应用查询页底部找到对应入口。
    </div>
    <div id="dl-section">
      <div class="skeleton" style="height:120px;border-radius:10px;"></div>
    </div>
  </section>

</div>

<footer>
  <div class="inner">
    <span>© 2025–2026 Warframe Profile</span>
    <span>本项目与 Digital Extremes 无关联</span>
  </div>
</footer>

<script>
const iconDl = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

function fmtDate(s) {
  return new Date(s).toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' });
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyText(text, btn) {
  navigator.clipboard?.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '已复制';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

fetch('./downloads.json')
  .then(r => { if (!r.ok) throw 0; return r.json(); })
  .then(list => {
    if (!list?.length) throw 0;
    const latest = list[0];
    const first  = latest.downloads?.[0];

    // ── hero ──
    let heroHtml = `<div class="hero-dl-block">
      <a class="btn-primary" href="${esc(first?.url||'#')}" target="_blank" rel="noopener">
        ${iconDl} 下载最新版
      </a>`;
    if (first?.code) {
      heroHtml += `<div class="code-box">
        <span class="code-label">提取码</span>
        <span class="code-val">${esc(first.code)}</span>
        <button class="code-copy" onclick="copyText('${esc(first.code)}',this)">复制</button>
      </div>`;
    }
    heroHtml += `</div>`;
    document.getElementById('hero-area').innerHTML = heroHtml;
    document.getElementById('hero-meta').innerHTML =
      `<span class="ver">v${esc(latest.version)}</span> · Windows x64 · ${fmtDate(latest.date)}`;

    // ── download section ──
    let dlItems = (latest.downloads || []).map(d => {
      let codeHtml = '';
      if (d.code) {
        codeHtml = `<div class="dl-code-inline">
          <span>提取码</span>
          <span class="code-v">${esc(d.code)}</span>
          <button onclick="copyText('${esc(d.code)}',this)">复制</button>
        </div>`;
      }
      return `<div class="dl-item">
        <span class="dl-item-name">${esc(d.label)}</span>
        <div class="dl-item-right">
          <a class="dl-link" href="${esc(d.url)}" target="_blank" rel="noopener">${iconDl} 打开云盘</a>
          ${codeHtml}
        </div>
      </div>`;
    }).join('');

    document.getElementById('dl-section').innerHTML = `
      <div class="dl-card">
        <div class="dl-card-head">
          <div class="dl-card-lhs">
            <span class="tag-name">v${esc(latest.version)}</span>
            <span class="tag-latest">latest</span>
          </div>
          <span class="dl-card-date">${fmtDate(latest.date)}</span>
        </div>
        <div class="dl-card-body">${dlItems}</div>
      </div>`;
  })
  .catch(() => {
    document.getElementById('hero-area').innerHTML =
      `<p style="font-size:13px;color:var(--muted)">下载信息暂不可用</p>`;
    document.getElementById('dl-section').innerHTML =
      `<p style="font-size:13px;color:var(--muted)">暂无下载信息，请稍后刷新。</p>`;
  });
</script>
</body>
</html>
