<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warframe Profile — 战甲档案查看器</title>
  <meta name="description" content="轻量级桌面工具，快速查看 Warframe 国际服玩家档案。支持 PC、PS、Xbox、Switch、Mobile 平台。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #09090b;
      --bg2:    #18181b;
      --bg3:    #27272a;
      --border: #3f3f46;
      --text:   #fafafa;
      --muted:  #a1a1aa;
      --subtle: #71717a;
      --white:  #ffffff;
      --radius: 10px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.6; min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--text); text-decoration: none; }
    .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }

    /* nav */
    nav {
      position: sticky; top: 0; z-index: 50;
      border-bottom: 1px solid var(--border);
      background: rgba(9,9,11,.88);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    nav .inner {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 720px; margin: 0 auto; padding: 0 24px; height: 54px;
    }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; }
    .logo-icon {
      width: 26px; height: 26px; border: 1px solid var(--border);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      background: var(--bg2);
    }
    .logo-icon svg { width: 13px; height: 13px; color: var(--muted); }
    .nav-links { display: flex; align-items: center; gap: 2px; }
    .nav-links a {
      font-size: 13px; color: var(--muted); padding: 5px 10px; border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .nav-links a:hover { color: var(--text); background: var(--bg2); }
    .nav-gh {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); padding: 5px 10px; border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .nav-gh:hover { color: var(--text); background: var(--bg2); }
    .nav-gh svg { width: 15px; height: 15px; }

    /* hero */
    .hero { padding: 88px 0 72px; text-align: center; position: relative; overflow: hidden; }
    .hero::before {
      content: ''; position: absolute; width: 560px; height: 280px;
      top: -50px; left: 50%; transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(255,255,255,.05) 0%, transparent 70%);
      pointer-events: none;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border: 1px solid var(--border); border-radius: 20px;
      font-size: 12px; color: var(--muted); background: var(--bg2); margin-bottom: 22px;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    h1 {
      font-size: clamp(30px, 6vw, 50px); font-weight: 700;
      letter-spacing: -.03em; line-height: 1.1; color: var(--white); margin-bottom: 18px;
    }
    .subtitle { font-size: 15px; color: var(--muted); max-width: 420px; margin: 0 auto 36px; line-height: 1.65; }

    .hero-btns {
      display: inline-flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 24px; background: var(--white); color: var(--bg);
      font-weight: 600; font-size: 14px; border-radius: var(--radius);
      border: none; cursor: pointer; transition: opacity .15s, transform .15s; text-decoration: none;
    }
    .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
    .btn-primary svg { width: 15px; height: 15px; flex-shrink: 0; }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 11px 18px; background: transparent; color: var(--muted);
      font-size: 14px; border-radius: var(--radius);
      border: 1px solid var(--border); cursor: pointer;
      transition: color .15s, border-color .15s, transform .15s; text-decoration: none;
    }
    .btn-secondary:hover { color: var(--text); border-color: var(--subtle); transform: translateY(-1px); }
    .btn-secondary svg { width: 15px; height: 15px; flex-shrink: 0; }

    .dl-meta { font-size: 12px; color: var(--subtle); margin-top: 14px; }
    .dl-meta .ver { font-family: 'JetBrains Mono', monospace; color: var(--muted); }

    .platforms { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; margin-top: 28px; }
    .plat { padding: 3px 11px; border: 1px solid var(--border); border-radius: 20px; font-size: 11px; color: var(--subtle); }

    hr { border: none; border-top: 1px solid var(--border); }
    section { padding: 52px 0; }
    .sec-label { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--subtle); margin-bottom: 10px; }
    h2 { font-size: 21px; font-weight: 700; letter-spacing: -.02em; color: var(--white); margin-bottom: 22px; }

    .notice {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg2); font-size: 13px; color: var(--muted); margin-bottom: 18px;
    }
    .notice svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 2px; color: var(--subtle); }

    /* download cards */
    .dl-card {
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg2); overflow: hidden; margin-bottom: 10px;
    }
    .dl-card-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
    }
    .dl-card-lhs { display: flex; align-items: center; gap: 10px; }
    .tag-name { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; }
    .tag-latest { font-size: 10px; padding: 2px 7px; border: 1px solid var(--border); border-radius: 10px; color: var(--subtle); background: var(--bg3); }
    .dl-card-date { font-size: 12px; color: var(--subtle); }
    .dl-card-body { padding: 16px; display: flex; flex-direction: column; gap: 10px; }

    .dl-item {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }
    .dl-item-name { font-size: 13px; color: var(--muted); }
    .dl-item-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .dl-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border: 1px solid var(--border); border-radius: 7px;
      font-size: 13px; color: var(--text); background: var(--bg3);
      cursor: pointer; text-decoration: none; transition: border-color .15s;
    }
    .dl-link:hover { border-color: var(--subtle); }
    .dl-link svg { width: 13px; height: 13px; flex-shrink: 0; }
    .dl-size { font-size: 12px; color: var(--subtle); }

    /* changelog */
    .changelog-card {
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg2); margin-bottom: 10px; overflow: hidden;
    }
    .changelog-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; cursor: pointer; user-select: none;
      transition: background .15s;
    }
    .changelog-head:hover { background: var(--bg3); }
    .changelog-head-lhs { display: flex; align-items: center; gap: 10px; }
    .changelog-head svg { width: 14px; height: 14px; color: var(--subtle); transition: transform .2s; }
    .changelog-body {
      padding: 0 16px; max-height: 0; overflow: hidden;
      transition: max-height .25s ease, padding .25s ease;
    }
    .changelog-body.open { max-height: 600px; padding: 0 16px 16px; }
    .changelog-body pre {
      font-family: 'Inter', sans-serif; font-size: 13px; color: var(--muted);
      white-space: pre-wrap; word-break: break-word; line-height: 1.7;
    }

    /* skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
      background-size: 400% 100%; animation: shimmer 1.6s infinite; border-radius: 8px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    footer { border-top: 1px solid var(--border); padding: 22px 0; }
    footer .inner {
      max-width: 720px; margin: 0 auto; padding: 0 24px;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
      font-size: 12px; color: var(--subtle);
    }
    footer a { color: var(--subtle); transition: color .15s; }
    footer a:hover { color: var(--muted); }

    @media (max-width: 540px) {
      .nav-links { display: none; }
      .hero-btns { flex-direction: column; width: 100%; }
      .btn-primary, .btn-secondary { width: 100%; justify-content: center; }
      .dl-item { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<nav>
  <div class="inner">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="3.5"/><path d="M12 11.5v8M9 17l3 3 3-3"/>
        </svg>
      </div>
      Warframe Profile
    </div>
    <div class="nav-links">
      <a href="#download">下载</a>
      <a href="#changelog">更新日志</a>
      <a class="nav-gh" href="https://github.com/wxhn1225/warframe-profile" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.021c0 4.428 2.865 8.184 6.839 9.504.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.605-3.369-1.342-3.369-1.342-.454-1.154-1.11-1.462-1.11-1.462-.907-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.2 22 16.447 22 12.021 22 6.484 17.522 2 12 2z"/></svg>
        GitHub
      </a>
    </div>
  </div>
</nav>

<div class="container">

  <div class="hero">
    <div class="badge"><span class="badge-dot"></span>国际服 · 免费工具</div>
    <h1>Warframe<br>Profile Viewer</h1>
    <p class="subtitle">无需登录，一键读取 EE.log，快速查看国际服玩家完整档案数据。</p>

    <div id="hero-area">
      <div class="skeleton" style="width:180px;height:44px;border-radius:10px;margin:0 auto;"></div>
    </div>
    <div class="dl-meta" id="hero-meta">&nbsp;</div>

    <div class="platforms">
      <span class="plat">PC</span>
      <span class="plat">PlayStation</span>
      <span class="plat">Xbox</span>
      <span class="plat">Switch</span>
      <span class="plat">Mobile</span>
    </div>
  </div>

  <hr />

  <section id="download">
    <div class="sec-label">下载</div>
    <h2>最新版本</h2>
    <div class="notice">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      本工具仅支持<strong style="color:var(--text);margin:0 3px">国际服</strong>账号。国服玩家可在应用查询页底部找到对应入口。
    </div>
    <div id="dl-section">
      <div class="skeleton" style="height:110px;border-radius:10px;"></div>
    </div>
  </section>

  <hr />

  <section id="changelog">
    <div class="sec-label">更新日志</div>
    <h2>历史版本</h2>
    <div id="cl-section">
      <div class="skeleton" style="height:52px;border-radius:10px;margin-bottom:8px;"></div>
      <div class="skeleton" style="height:52px;border-radius:10px;"></div>
    </div>
  </section>

</div>

<footer>
  <div class="inner">
    <span>© 2025–2026 Warframe Profile</span>
    <span>
      <a href="https://github.com/wxhn1225/warframe-profile" target="_blank" rel="noopener">GitHub</a>
      &nbsp;·&nbsp; 本项目与 Digital Extremes 无关联
    </span>
  </div>
</footer>

<script>
const REPO = 'wxhn1225/warframe-profile';
const GH_API = `https://api.github.com/repos/${REPO}/releases?per_page=10`;
const FALLBACK = './releases.json';

const iconDl = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
const iconChevron = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;

function fmtDate(s) {
  return new Date(s).toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' });
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// parse release assets from GitHub API release object
function buildDownloadItems(release) {
  const assets = release.assets || [];
  const tag = release.tag_name;
  // match zh and full exe installers
  const zh   = assets.find(a => a.name.includes('-setup') && a.name.endsWith('.exe') && (a.name.includes('-zh') || (!a.name.includes('-full'))));
  const full = assets.find(a => a.name.includes('-setup') && a.name.endsWith('.exe') && a.name.includes('-full'));

  let items = [];
  if (zh) {
    const sizeMB = (zh.size / 1024 / 1024).toFixed(1);
    items.push({ label: '简中版 .exe', url: zh.browser_download_url, size: sizeMB + ' MB' });
  }
  if (full) {
    const sizeMB = (full.size / 1024 / 1024).toFixed(1);
    items.push({ label: '多语言版 .exe', url: full.browser_download_url, size: sizeMB + ' MB' });
  }
  // fallback: any exe
  if (!items.length) {
    assets.filter(a => a.name.endsWith('.exe') && !a.name.endsWith('.sig')).forEach(a => {
      items.push({ label: a.name, url: a.browser_download_url, size: (a.size/1024/1024).toFixed(1)+' MB' });
    });
  }
  return items;
}

function renderDlItem(d, isFirst) {
  return `<div class="dl-item">
    <span class="dl-item-name">${esc(d.label)}</span>
    <div class="dl-item-right">
      ${d.size ? `<span class="dl-size">${esc(d.size)}</span>` : ''}
      <a class="dl-link" href="${esc(d.url)}" target="_blank" rel="noopener">${iconDl} 下载</a>
    </div>
  </div>`;
}

function renderRelease(release, idx) {
  const tag    = release.tag_name;
  const date   = fmtDate(release.published_at);
  const body   = (release.body || '').trim();
  const items  = buildDownloadItems(release);
  const isLatest = idx === 0;

  const dlHtml = items.length
    ? items.map((d, i) => renderDlItem(d, i === 0)).join('')
    : `<p style="font-size:13px;color:var(--subtle)">暂无安装包资源</p>`;

  if (isLatest) {
    document.getElementById('dl-section').innerHTML = `
      <div class="dl-card">
        <div class="dl-card-head">
          <div class="dl-card-lhs">
            <span class="tag-name">${esc(tag)}</span>
            <span class="tag-latest">latest</span>
          </div>
          <span class="dl-card-date">${date}</span>
        </div>
        <div class="dl-card-body">${dlHtml}</div>
      </div>`;

    // hero
    const primaryItem = items[0];
    if (primaryItem) {
      document.getElementById('hero-area').innerHTML = `
        <div style="display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;">
          <a class="btn-primary" href="${esc(primaryItem.url)}" target="_blank" rel="noopener">
            ${iconDl} 下载最新版
          </a>
          <a class="btn-secondary" href="https://github.com/${REPO}/releases/tag/${esc(tag)}" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor" style="width:14px;height:14px"><path d="M12 2C6.477 2 2 6.484 2 12.021c0 4.428 2.865 8.184 6.839 9.504.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.605-3.369-1.342-3.369-1.342-.454-1.154-1.11-1.462-1.11-1.462-.907-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.2 22 16.447 22 12.021 22 6.484 17.522 2 12 2z"/></svg>
            所有版本
          </a>
        </div>`;
      document.getElementById('hero-meta').innerHTML =
        `<span class="ver">${esc(tag)}</span> · Windows x64 · ${date}`;
    } else {
      document.getElementById('hero-area').innerHTML =
        `<a class="btn-secondary" href="https://github.com/${REPO}/releases" target="_blank" rel="noopener">前往 GitHub Releases 下载</a>`;
      document.getElementById('hero-meta').innerHTML = '';
    }
  }

  // changelog entry
  return `<div class="changelog-card">
    <div class="changelog-head" onclick="toggleCl(this)">
      <div class="changelog-head-lhs">
        <span class="tag-name">${esc(tag)}</span>
        ${isLatest ? '<span class="tag-latest">latest</span>' : ''}
        <span style="font-size:12px;color:var(--subtle)">${date}</span>
      </div>
      ${iconChevron}
    </div>
    <div class="changelog-body">
      <pre>${body ? esc(body) : '（无发布说明）'}</pre>
    </div>
  </div>`;
}

function toggleCl(head) {
  const body = head.nextElementSibling;
  const svg  = head.querySelector('svg');
  const open = body.classList.toggle('open');
  if (svg) svg.style.transform = open ? 'rotate(180deg)' : '';
}

async function loadReleases() {
  let releases = null;

  // 1. try GitHub API
  try {
    const r = await fetch(GH_API, { headers: { Accept: 'application/vnd.github+json' } });
    if (r.ok) releases = await r.json();
  } catch {}

  // 2. fallback to CI-generated releases.json
  if (!releases?.length) {
    try {
      const r = await fetch(FALLBACK);
      if (r.ok) {
        const local = await r.json();
        // local format: [{tag_name, name, body, published_at}] — no assets
        releases = local.map(x => ({ ...x, assets: [] }));
      }
    } catch {}
  }

  if (!releases?.length) {
    document.getElementById('hero-area').innerHTML =
      `<a class="btn-secondary" href="https://github.com/${REPO}/releases" target="_blank" rel="noopener">前往 GitHub Releases 下载</a>`;
    document.getElementById('hero-meta').innerHTML = '';
    document.getElementById('dl-section').innerHTML =
      `<p style="font-size:13px;color:var(--muted)">暂无发布信息，请前往 <a href="https://github.com/${REPO}/releases" target="_blank" style="color:var(--text);text-decoration:underline">GitHub Releases</a> 查看。</p>`;
    document.getElementById('cl-section').innerHTML = '';
    return;
  }

  const clHtml = releases.map((rel, i) => renderRelease(rel, i)).join('');
  document.getElementById('cl-section').innerHTML = clHtml;

  // auto-open first changelog
  const firstHead = document.querySelector('.changelog-head');
  if (firstHead) toggleCl(firstHead);
}

loadReleases();
</script>
</body>
</html>
