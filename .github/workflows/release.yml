name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: zh
            config: src-tauri/tauri.zh.conf.json
            data_mode: zh
          - variant: full
            config: src-tauri/tauri.full.conf.json
            data_mode: full

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          package_json_file: app/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: app/src-tauri

      - name: Install frontend deps
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Copy data files (${{ matrix.variant }})
        working-directory: app
        run: node scripts/copy-data.mjs ${{ matrix.data_mode }}

      - name: Build Tauri app (${{ matrix.variant }})
        working-directory: app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --config ${{ matrix.config }}

      - name: Rename installers
        shell: pwsh
        run: |
          $nsis = Get-ChildItem "app/src-tauri/target/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue
          foreach ($f in $nsis) {
            $newName = $f.BaseName + "-${{ matrix.variant }}" + $f.Extension
            Rename-Item $f.FullName $newName
          }
          $msi = Get-ChildItem "app/src-tauri/target/release/bundle/msi/*.msi" -ErrorAction SilentlyContinue
          foreach ($f in $msi) {
            $newName = $f.BaseName + "-${{ matrix.variant }}" + $f.Extension
            Rename-Item $f.FullName $newName
          }

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/src-tauri/target/release/bundle/nsis/*-${{ matrix.variant }}.exe
            app/src-tauri/target/release/bundle/msi/*-${{ matrix.variant }}.msi
