name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: zh
            config: src-tauri/tauri.zh.conf.json
            data_mode: zh
          - variant: full
            config: src-tauri/tauri.full.conf.json
            data_mode: full

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          package_json_file: app/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: app/src-tauri

      - name: Install frontend deps
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          foreach ($f in @("app/src-tauri/tauri.conf.json","app/src-tauri/tauri.zh.conf.json","app/src-tauri/tauri.full.conf.json")) {
            $content = Get-Content $f -Raw
            $content = $content -replace '"version":\s*"[^"]+"', "`"version`": `"$version`""
            Set-Content $f $content -NoNewline
          }
          Write-Host "Version set to $version"

      - name: Copy data files (${{ matrix.variant }})
        working-directory: app
        run: node scripts/copy-data.mjs ${{ matrix.data_mode }}

      - name: Build Tauri app (${{ matrix.variant }})
        working-directory: app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --config ${{ matrix.config }}

      - name: List bundle directory (debug)
        shell: pwsh
        run: |
          Write-Host "=== bundle directory ==="
          Get-ChildItem "app/src-tauri/target/release/bundle" -Recurse -File |
            Select-Object FullName, Length | Format-Table -AutoSize

      - name: Rename installers and updater artifacts
        shell: pwsh
        run: |
          $variant = "${{ matrix.variant }}"
          $nsisDir = "app/src-tauri/target/release/bundle/nsis"
          $msiDir  = "app/src-tauri/target/release/bundle/msi"

          # rename .exe
          Get-ChildItem "$nsisDir/*.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            Rename-Item $_.FullName ($_.BaseName + "-${variant}" + $_.Extension)
          }
          # rename .msi
          Get-ChildItem "$msiDir/*.msi" -ErrorAction SilentlyContinue | ForEach-Object {
            Rename-Item $_.FullName ($_.BaseName + "-${variant}" + $_.Extension)
          }
          # rename .nsis.zip (anywhere under bundle/)
          Get-ChildItem "app/src-tauri/target/release/bundle" -Recurse -Filter "*.nsis.zip" -ErrorAction SilentlyContinue | ForEach-Object {
            $base = $_.Name -replace '\.nsis\.zip$', ''
            Rename-Item $_.FullName (Join-Path $_.DirectoryName "${base}-${variant}.nsis.zip")
          }
          # rename .nsis.zip.sig
          Get-ChildItem "app/src-tauri/target/release/bundle" -Recurse -Filter "*.nsis.zip.sig" -ErrorAction SilentlyContinue | ForEach-Object {
            $base = $_.Name -replace '\.nsis\.zip\.sig$', ''
            Rename-Item $_.FullName (Join-Path $_.DirectoryName "${base}-${variant}.nsis.zip.sig")
          }

      - name: Generate latest-${{ matrix.variant }}.json
        shell: pwsh
        run: |
          $variant  = "${{ matrix.variant }}"
          $tag      = "${{ github.ref_name }}"
          $version  = $tag.TrimStart("v")
          $repo     = "${{ github.repository }}"
          $bundleDir = "app/src-tauri/target/release/bundle"

          # 在整个 bundle 目录下查找（兼容 nsis/ 和 updater/ 两种位置）
          $sigFile = Get-ChildItem $bundleDir -Recurse -Filter "*-${variant}.nsis.zip.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          $zipFile = Get-ChildItem $bundleDir -Recurse -Filter "*-${variant}.nsis.zip"     -ErrorAction SilentlyContinue | Select-Object -First 1

          if (-not $sigFile -or -not $zipFile) {
            Write-Host "WARNING: updater zip not found, skipping latest-${variant}.json"
            exit 0
          }

          $sig = (Get-Content $sigFile.FullName -Raw).Trim()
          $url = "https://github.com/${repo}/releases/download/${tag}/$($zipFile.Name)"

          $json = [ordered]@{
            version  = $version
            notes    = ""
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = $url
              }
            }
          } | ConvertTo-Json -Depth 5

          $json | Out-File -FilePath "latest-${variant}.json" -Encoding UTF8NoBOM
          Write-Host "=== latest-${variant}.json ==="
          Get-Content "latest-${variant}.json"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            app/src-tauri/target/release/bundle/nsis/*-${{ matrix.variant }}.exe
            app/src-tauri/target/release/bundle/msi/*-${{ matrix.variant }}.msi
            app/src-tauri/target/release/bundle/**/*-${{ matrix.variant }}.nsis.zip
            app/src-tauri/target/release/bundle/**/*-${{ matrix.variant }}.nsis.zip.sig
            latest-${{ matrix.variant }}.json
