name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: zh
            config: src-tauri/tauri.zh.conf.json
            data_mode: zh
          - variant: full
            config: src-tauri/tauri.full.conf.json
            data_mode: full

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          package_json_file: app/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: app/src-tauri

      - name: Install frontend deps
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Copy data files (${{ matrix.variant }})
        working-directory: app
        run: node scripts/copy-data.mjs ${{ matrix.data_mode }}

      - name: Build Tauri app (${{ matrix.variant }})
        working-directory: app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --config ${{ matrix.config }}

      - name: Rename installers and updater artifacts
        shell: pwsh
        run: |
          $variant = "${{ matrix.variant }}"
          $nsisDir = "app/src-tauri/target/release/bundle/nsis"
          $msiDir  = "app/src-tauri/target/release/bundle/msi"

          # rename .exe
          Get-ChildItem "$nsisDir/*.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            Rename-Item $_.FullName ($_.BaseName + "-${variant}" + $_.Extension)
          }
          # rename .msi
          Get-ChildItem "$msiDir/*.msi" -ErrorAction SilentlyContinue | ForEach-Object {
            Rename-Item $_.FullName ($_.BaseName + "-${variant}" + $_.Extension)
          }
          # rename .nsis.zip
          Get-ChildItem "$nsisDir/*.nsis.zip" -ErrorAction SilentlyContinue | ForEach-Object {
            $base = $_.Name -replace '\.nsis\.zip$', ''
            Rename-Item $_.FullName (Join-Path $nsisDir "${base}-${variant}.nsis.zip")
          }
          # rename .nsis.zip.sig
          Get-ChildItem "$nsisDir/*.nsis.zip.sig" -ErrorAction SilentlyContinue | ForEach-Object {
            $base = $_.Name -replace '\.nsis\.zip\.sig$', ''
            Rename-Item $_.FullName (Join-Path $nsisDir "${base}-${variant}.nsis.zip.sig")
          }

      - name: Generate latest-${{ matrix.variant }}.json
        shell: pwsh
        run: |
          $variant  = "${{ matrix.variant }}"
          $tag      = "${{ github.ref_name }}"
          $version  = $tag.TrimStart("v")
          $repo     = "${{ github.repository }}"
          $nsisDir  = "app/src-tauri/target/release/bundle/nsis"

          $sigFile  = Get-ChildItem "$nsisDir/*-${variant}.nsis.zip.sig" | Select-Object -First 1
          $zipFile  = Get-ChildItem "$nsisDir/*-${variant}.nsis.zip"     | Select-Object -First 1

          if (-not $sigFile -or -not $zipFile) {
            Write-Error "Updater artifacts not found"; exit 1
          }

          $sig = (Get-Content $sigFile.FullName -Raw).Trim()
          $url = "https://github.com/${repo}/releases/download/${tag}/$($zipFile.Name)"

          $json = [ordered]@{
            version  = $version
            notes    = ""
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = $url
              }
            }
          } | ConvertTo-Json -Depth 5

          $json | Out-File -FilePath "latest-${variant}.json" -Encoding UTF8NoBOM
          Write-Host "=== latest-${variant}.json ==="
          Get-Content "latest-${variant}.json"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/src-tauri/target/release/bundle/nsis/*-${{ matrix.variant }}.exe
            app/src-tauri/target/release/bundle/msi/*-${{ matrix.variant }}.msi
            app/src-tauri/target/release/bundle/nsis/*-${{ matrix.variant }}.nsis.zip
            app/src-tauri/target/release/bundle/nsis/*-${{ matrix.variant }}.nsis.zip.sig
            latest-${{ matrix.variant }}.json
