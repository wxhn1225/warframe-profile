name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: zh
            config: src-tauri/tauri.zh.conf.json
            data_mode: zh
          - variant: full
            config: src-tauri/tauri.full.conf.json
            data_mode: full

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          package_json_file: app/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: app/src-tauri

      - name: Install frontend deps
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          foreach ($f in @("app/src-tauri/tauri.conf.json","app/src-tauri/tauri.zh.conf.json","app/src-tauri/tauri.full.conf.json")) {
            $content = Get-Content $f -Raw
            $content = $content -replace '"version":\s*"[^"]+"', "`"version`": `"$version`""
            Set-Content $f $content -NoNewline
          }
          Write-Host "Version set to $version"

      - name: Copy data files (${{ matrix.variant }})
        working-directory: app
        run: node scripts/copy-data.mjs ${{ matrix.data_mode }}

      - name: Build Tauri app (${{ matrix.variant }})
        working-directory: app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --config ${{ matrix.config }}

      - name: List bundle directory (debug)
        shell: pwsh
        run: |
          Write-Host "=== bundle directory ==="
          Get-ChildItem "app/src-tauri/target/release/bundle" -Recurse -File |
            Select-Object FullName, Length | Format-Table -AutoSize

      - name: Rename installers and updater artifacts
        shell: pwsh
        run: |
          $variant = "${{ matrix.variant }}"
          $nsisDir = "app/src-tauri/target/release/bundle/nsis"
          $msiDir  = "app/src-tauri/target/release/bundle/msi"

          # rename .exe
          Get-ChildItem "$nsisDir/*.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            Rename-Item $_.FullName ($_.BaseName + "-${variant}" + $_.Extension)
          }
          # rename .exe.sig (Tauri v2 updater signature)
          Get-ChildItem "$nsisDir/*.exe.sig" -ErrorAction SilentlyContinue | ForEach-Object {
            $base = $_.Name -replace '\.exe\.sig$', ''
            Rename-Item $_.FullName (Join-Path $_.DirectoryName "${base}-${variant}.exe.sig")
          }
          # rename .msi
          Get-ChildItem "$msiDir/*.msi" -ErrorAction SilentlyContinue | ForEach-Object {
            Rename-Item $_.FullName ($_.BaseName + "-${variant}" + $_.Extension)
          }

      - name: Generate latest-${{ matrix.variant }}.json
        shell: pwsh
        run: |
          $variant  = "${{ matrix.variant }}"
          $tag      = "${{ github.ref_name }}"
          $version  = $tag.TrimStart("v")
          $repo     = "${{ github.repository }}"
          $nsisDir  = "app/src-tauri/target/release/bundle/nsis"

          # Tauri v2 generates .exe.sig (not .nsis.zip.sig)
          $sigFile = Get-ChildItem $nsisDir -Filter "*-${variant}.exe.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          $exeFile = Get-ChildItem $nsisDir -Filter "*-${variant}.exe"     -ErrorAction SilentlyContinue | Select-Object -First 1

          if (-not $sigFile -or -not $exeFile) {
            Write-Host "WARNING: updater exe.sig not found, skipping latest-${variant}.json"
            Write-Host "Files in nsis dir:"
            Get-ChildItem $nsisDir -ErrorAction SilentlyContinue | Select-Object Name
            exit 0
          }

          $sig = (Get-Content $sigFile.FullName -Raw).Trim()
          # GitHub replaces spaces with dots in release asset filenames
          $ghName = $exeFile.Name -replace ' ', '.'
          $url = "https://github.com/${repo}/releases/download/${tag}/${ghName}"

          $json = [ordered]@{
            version  = $version
            notes    = ""
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = $url
              }
            }
          } | ConvertTo-Json -Depth 5

          $json | Out-File -FilePath "latest-${variant}.json" -Encoding UTF8NoBOM
          Write-Host "=== latest-${variant}.json ==="
          Get-Content "latest-${variant}.json"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            app/src-tauri/target/release/bundle/nsis/*-${{ matrix.variant }}.exe
            app/src-tauri/target/release/bundle/nsis/*-${{ matrix.variant }}.exe.sig
            app/src-tauri/target/release/bundle/msi/*-${{ matrix.variant }}.msi
            latest-${{ matrix.variant }}.json

  update-pages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate docs/releases.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Wait a moment so all release assets are visible
          sleep 10
          gh api "repos/${{ github.repository }}/releases?per_page=20" > /tmp/releases_raw.json
          python3 - <<'PYEOF'
          import json, os

          raw = json.load(open('/tmp/releases_raw.json'))
          os.makedirs('docs', exist_ok=True)

          # ── releases.json for the landing page ──
          data = []
          for r in raw:
              data.append({
                  'tag_name':     r['tag_name'],
                  'name':         r.get('name') or r['tag_name'],
                  'body':         r.get('body') or '',
                  'published_at': r['published_at'],
                  'assets': [
                      {'name': a['name'], 'browser_download_url': a['browser_download_url']}
                      for a in r.get('assets', [])
                  ]
              })
          json.dump(data, open('docs/releases.json', 'w'), ensure_ascii=False, indent=2)
          print(f"Written {len(data)} releases to docs/releases.json")

          # ── mirror latest-zh.json / latest-full.json to docs/ ──
          # so the Tauri updater endpoint can use github.io instead of github.com
          latest = raw[0] if raw else None
          if latest:
              for variant in ('zh', 'full'):
                  asset = next(
                      (a for a in latest.get('assets', []) if a['name'] == f'latest-{variant}.json'),
                      None
                  )
                  if asset:
                      import urllib.request
                      urllib.request.urlretrieve(asset['browser_download_url'], f'docs/latest-{variant}.json')
                      print(f"Mirrored latest-{variant}.json to docs/")
          PYEOF

      - name: Commit docs/releases.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/releases.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: update docs/releases.json for ${{ github.ref_name }} [skip ci]" && \
            git push origin main
